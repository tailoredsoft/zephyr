CONFIG_MAIN_STACK_SIZE=2048

CONFIG_BT=y
CONFIG_BT_ISO_BROADCASTER=y
CONFIG_LOG=y
CONFIG_BT_DEVICE_NAME="GroupTalk-Primary"

CONFIG_BT_ISO_MAX_CHAN=2
CONFIG_BT_ISO_TX_BUF_COUNT=4

CONFIG_BT_ISO_TX_MTU=8

# Reduce the rate of printing the packet report to avoid flooding the console
CONFIG_ISO_PRINT_INTERVAL=100

# Allow debugging in Ozone
CONFIG_DEBUG=y

# Force the mac address to be static random
CONFIG_BT_PRIVACY=n

# to enable static random address which does not change
# CONFIG_BT_KEYS_OVERWRITE_OLDEST=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y