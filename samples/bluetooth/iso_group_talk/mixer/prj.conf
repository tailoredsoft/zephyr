CONFIG_BT_DEVICE_NAME="GroupTalk-Mixer"

CONFIG_BT_OBSERVER=y
CONFIG_BT_ISO_SYNC_RECEIVER=y

# Reduce the rate of printing the packet report to avoid flooding the console
CONFIG_ISO_PRINT_INTERVAL=50

# Enable code specific to the grouptalk mixer device
CONFIG_GROUPTALK_COMMON=y
CONFIG_GROUPTALK_MIXER=y
